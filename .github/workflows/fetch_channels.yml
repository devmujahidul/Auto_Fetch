name: Fetch Ayna OTT Channels

on:
  workflow_dispatch:
  schedule:
    - cron: '*/50 * * * *' # Run every 50 minutes (before 1-hour URL expiration)

permissions:
  contents: write

env:
  WORKFLOW_TIMEOUT: 900

jobs:
  fetch_channels_job:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: ⬇️ Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: ⏭️ Check if recent successful run exists
      id: check_status
      run: |
        if [ -f "fetch_status.json" ]; then
          STATUS=$(python3 -c "import json; data=json.load(open('fetch_status.json')); print(data.get('status', ''))" 2>/dev/null || echo "")
          TIMESTAMP=$(python3 -c "import json, datetime; data=json.load(open('fetch_status.json')); ts=data.get('timestamp',''); print((datetime.datetime.fromisoformat(ts) if ts else datetime.datetime.min).isoformat())" 2>/dev/null || echo "")
          
          if [ "$STATUS" = "success" ] && [ ! -z "$TIMESTAMP" ]; then
            LAST_RUN_SECONDS=$(python3 -c "import datetime; print(int((datetime.datetime.now(datetime.timezone.utc).replace(tzinfo=None) - datetime.datetime.fromisoformat('$TIMESTAMP')).total_seconds()))" 2>/dev/null || echo "0")
            
            if [ "$LAST_RUN_SECONDS" -lt 3300 ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "⏭️ Last successful run was ${LAST_RUN_SECONDS}s ago - skipping (URLs still fresh)"
              exit 0
            fi
          fi
        fi
        echo "skip=false" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: 🐍 Set up Python
      if: steps.check_status.outputs.skip != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: ⚡ Cache pip
      if: steps.check_status.outputs.skip != 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 📦 Install dependencies
      if: steps.check_status.outputs.skip != 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      continue-on-error: true

    - name: 🏃 Run channel fetch script with retries
      if: steps.check_status.outputs.skip != 'true'
      id: fetch_script
      env:
        AYNA_OTT_EMAIL: ${{ secrets.AYNA_OTT_EMAIL }}
        AYNA_OTT_PASSWORD: ${{ secrets.AYNA_OTT_PASSWORD }}
        LOGIN_DEVICE_ID: ${{ secrets.LOGIN_DEVICE_ID }}
        PLAYER_BASE: ${{ secrets.PLAYER_BASE }}
        SOCKS5_PROXY_HOST: ${{ secrets.SOCKS5_PROXY_HOST }}
        SOCKS5_PROXY_PORT: ${{ secrets.SOCKS5_PROXY_PORT }}
        SOCKS5_PROXY_USER: ${{ secrets.SOCKS5_PROXY_USER }}
        SOCKS5_PROXY_PASS: ${{ secrets.SOCKS5_PROXY_PASS }}
      run: |
        MAX_ATTEMPTS=2
        ATTEMPT=1
        
        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "🔄 Attempt $ATTEMPT of $MAX_ATTEMPTS"
          if python fetch_channels.py; then
            echo "✅ Script executed successfully on attempt $ATTEMPT"
            exit 0
          else
            EXIT_CODE=$?
            echo "⚠️ Script failed with exit code $EXIT_CODE on attempt $ATTEMPT"
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "⏳ Waiting 10 seconds before retry..."
              sleep 10
            fi
            ATTEMPT=$((ATTEMPT + 1))
          fi
        done
        
        echo "❌ All $MAX_ATTEMPTS attempts failed"
        exit 1
      continue-on-error: true

    - name: ✅ Verify output files exist
      if: steps.check_status.outputs.skip != 'true'
      id: verify_output
      run: |
        missing=0

        for f in output.json original_output.m3u output.m3u; do
          if [ -f "$f" ]; then
            echo "✅ $f exists - $(wc -c < "$f") bytes"
          else
            echo "❌ ERROR: $f not found"
            missing=1
          fi
        done

        if [ $missing -eq 0 ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          python -c "import json; data = json.load(open('output.json')); print(f\"Last updated: {data.get('last_updated', 'N/A')}\"); print(f\"Channels count: {len(data.get('channels', []))}\")" || true
        else
          echo "status=not_found" >> $GITHUB_OUTPUT
          exit 1
        fi
      continue-on-error: true

    - name: 📊 Upload execution status
      id: upload_status
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fetch-status-${{ github.run_number }}
        path: |
          fetch_status.json
          output.json
          original_output.m3u
          output.m3u
        retention-days: 7
      continue-on-error: true

    - name: ⬆️ Upload outputs as an Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ayna-ott-outputs-${{ github.sha }}
        path: |
          output.json
          original_output.m3u
          output.m3u
        retention-days: 7
      continue-on-error: true

    - name: 📝 Commit and push changes
      id: push_changes
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        # Stage outputs even if they are new/untracked
        git add output.json original_output.m3u output.m3u || true

        if git diff --cached --quiet; then
          echo "ℹ️ No changes to outputs to commit"
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "📝 Changes detected, committing..."
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git commit -m "Update channels data [auto-fetch] $TIMESTAMP"
          git push origin HEAD:main
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: 🔔 Report Job Status
      if: always()
      run: |
        echo "📋 WORKFLOW EXECUTION SUMMARY"
        echo "=============================="
        echo "Fetch Script Status: ${{ steps.fetch_script.outcome }}"
        echo "Output Verification: ${{ steps.verify_output.outputs.status }}"
        echo "Git Push Status: ${{ steps.push_changes.outputs.changes }}"
        echo ""
        
        if [ -f "fetch_status.json" ]; then
          echo "📊 Fetch Status Details:"
          cat fetch_status.json
        fi
      continue-on-error: true

    - name: 🚨 Final Status Check
      if: always()
      env:
        FETCH_OUTCOME: ${{ steps.fetch_script.outcome }}
        VERIFY_STATUS: ${{ steps.verify_output.outputs.status }}
        PUSH_CHANGES: ${{ steps.push_changes.outcome }}
      run: |
        if [ "$FETCH_OUTCOME" = "failure" ]; then
          echo "❌ CRITICAL: Fetch script failed after all retries!"
          echo "⚠️ NOT using stale fallback data - URLs and tokens are expired!"
          echo ""
          echo "Next steps:"
          echo "1. Check GitHub Actions logs for detailed error messages"
          echo "2. Verify API endpoint is accessible"
          echo "3. Verify credentials (AYNA_OTT_EMAIL, AYNA_OTT_PASSWORD)"
          echo "4. Check network/proxy connectivity"
          echo "5. Manually trigger workflow after fixing issues"
          echo ""
          exit 1
        fi
        
        if [ "$VERIFY_STATUS" != "success" ]; then
          echo "❌ CRITICAL: output.json verification failed!"
          exit 1
        fi

        if [ "$PUSH_CHANGES" = "failure" ]; then
          echo "❌ CRITICAL: Git push failed; outputs were not written back to the repo."
          exit 1
        fi
        
        echo "✅ Workflow completed successfully with fresh data"
        exit 0
      continue-on-error: false
